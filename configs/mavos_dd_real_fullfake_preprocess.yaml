# MAVOS-DD 预处理 detect 阶段配置。

paths:
  split_dir: splits/mavos_dd_real_fullfake
  # 原始视频根目录。
  raw_video_root: /data/OneDay/MAVOS-DD
  # 当前协议所有预处理中间产物的根目录。
  artifact_root: /data/OneDay/artifacts/avhubert/mavos_dd_real_fullfake
  manifest_dir: /data/OneDay/artifacts/avhubert/mavos_dd_real_fullfake/manifests
  # detect 阶段输出 landmarks 的目录。
  landmark_dir: /data/OneDay/artifacts/avhubert/mavos_dd_real_fullfake/landmarks
  # align 阶段输出 mouth ROI 的目录。
  mouth_roi_root: /data/OneDay/artifacts/avhubert/mavos_dd_real_fullfake/mouth_roi
  cnn_detector_path: resources/dlib/mmod_human_face_detector.dat
  face_predictor_path: resources/dlib/shape_predictor_68_face_landmarks.dat
  mean_face_path: resources/avhubert/20words_mean_face.npy

preprocess:
  split_names:
    - train
    - val
    - test
  manifest_name: all
  # detect 阶段：GPU 进行人脸检测，CPU 完成关键点回归和 landmarks 写盘。
  stage: detect
  crop_width: 96
  crop_height: 96
  start_idx: 48
  stop_idx: 68
  window_margin: 12
  fps: 25
  save_landmarks: true
  strict: true
  detector_batch_size: 128

runtime:
  devices: [0, 1]
  workers_per_device: 1
  cpu_threads_per_worker: 2
  start_method: spawn
  show_main_progress: true
  show_worker_logs: false

logging:
  level: INFO
  main_log_filename: preprocess.log
  worker_log_filename_template: preprocess_rank{rank}.log
