experiment_name: av1m_val_real_fullfake_avhubert

paths:
  dataset_root: dataset/AV-Deepfake1M
  raw_video_root: dataset/AV-Deepfake1M/val
  split_dir: splits/av1m_val_real_fullfake
  artifact_root: artifacts/avhubert/av1m_val_real_fullfake
  manifest_dir: artifacts/avhubert/av1m_val_real_fullfake/manifests
  landmark_dir: artifacts/avhubert/av1m_val_real_fullfake/landmarks
  mouth_roi_root: artifacts/avhubert/av1m_val_real_fullfake/mouth_roi
  output_root: outputs/avhubert/av1m_val_real_fullfake
  checkpoint_path: model/self_large_vox_433h.pt
  avhubert_repo: third_party/av_hubert
  cnn_detector_path: resources/dlib/mmod_human_face_detector.dat
  face_predictor_path: resources/dlib/shape_predictor_68_face_landmarks.dat
  mean_face_path: resources/avhubert/20words_mean_face.npy

preprocess:
  manifest_names:
    - train
    - val
    - test
  nshard: 1
  rank: 0
  crop_width: 96
  crop_height: 96
  start_idx: 48
  stop_idx: 68
  window_margin: 12
  fps: 25
  save_landmarks: true
  strict: true

data:
  max_frames: 300
  pad_to_batch_max: true
  image_crop_size: 88
  image_mean: 0.421
  image_std: 0.165
  horizontal_flip_prob: 0.5
  shuffle_train: true
  drop_last_train: false

model:
  # SSR-DFD baseline: frozen AV-HuBERT backbone + shared Linear(1024, 1) probe.
  freeze_backbone: true

train:
  seed: 42
  # Set one or more CUDA device indices here. DDP is enabled automatically when len(devices) > 1.
  devices: [0]
  backend: nccl
  master_addr: 127.0.0.1
  master_port: 29501
  epochs: 10
  # Per-GPU batch size and per-process DataLoader workers.
  batch_size: 2
  num_workers: 2
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 5.0
  amp: false
  log_interval: 20

logging:
  level: INFO
  train_log_filename: train.log
  rank_log_filename_template: train_rank{rank}.log
  show_progress: true
  show_rank_logs: false
