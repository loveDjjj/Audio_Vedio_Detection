paths:
  split_dir: splits/av1m_val_real_fullfake
  # Linux host data root lives under /data/OneDay.
  # Full-protocol AV1M splits now store train/ and val/ prefixes in relative_path.
  raw_video_root: /data/OneDay/AV-Deepfake1M
  artifact_root: artifacts/avhubert/av1m_val_real_fullfake
  manifest_dir: artifacts/avhubert/av1m_val_real_fullfake/manifests
  landmark_dir: artifacts/avhubert/av1m_val_real_fullfake/landmarks
  mouth_roi_root: artifacts/avhubert/av1m_val_real_fullfake/mouth_roi
  cnn_detector_path: resources/dlib/mmod_human_face_detector.dat
  face_predictor_path: resources/dlib/shape_predictor_68_face_landmarks.dat
  mean_face_path: resources/avhubert/20words_mean_face.npy

preprocess:
  split_names:
    - train
    - val
    - test
  manifest_name: all
  stage: all
  crop_width: 96
  crop_height: 96
  start_idx: 48
  stop_idx: 68
  window_margin: 12
  fps: 25
  save_landmarks: true
  strict: true

runtime:
  # Default for an 8x4090 + 88 vCPU host: 2 workers per GPU, 4 CPU threads per worker.
  devices: [0, 1, 2, 3, 4, 5, 6, 7]
  workers_per_device: 2
  cpu_threads_per_worker: 4
  start_method: spawn
  show_main_progress: true
  show_worker_logs: false

logging:
  level: INFO
  main_log_filename: preprocess.log
  worker_log_filename_template: preprocess_rank{rank}.log
