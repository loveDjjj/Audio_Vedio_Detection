# FakeAVCeleb 预处理 align 阶段配置。

paths:
  split_dir: splits/fakeavceleb_real_fullfake
  # align 阶段仍然需要原始视频来执行几何对齐与嘴部裁剪。
  raw_video_root: /data/OneDay/FakeAVCeleb
  artifact_root: /data/OneDay/artifacts/avhubert/fakeavceleb_real_fullfake
  manifest_dir: /data/OneDay/artifacts/avhubert/fakeavceleb_real_fullfake/manifests
  # 这里的 landmarks 必须先由 detect 阶段生成。
  landmark_dir: /data/OneDay/artifacts/avhubert/fakeavceleb_real_fullfake/landmarks
  mouth_roi_root: /data/OneDay/artifacts/avhubert/fakeavceleb_real_fullfake/mouth_roi
  cnn_detector_path: resources/dlib/mmod_human_face_detector.dat
  face_predictor_path: resources/dlib/shape_predictor_68_face_landmarks.dat
  mean_face_path: resources/avhubert/20words_mean_face.npy

preprocess:
  split_names:
    - train
    - val
    - test
  manifest_name: all
  # align 阶段只读取 landmarks 并生成 mouth ROI，不再触发 dlib 检测。
  stage: align
  crop_width: 96
  crop_height: 96
  start_idx: 48
  stop_idx: 68
  window_margin: 12
  fps: 25
  save_landmarks: true
  strict: true
  detector_batch_size: 32

runtime:
  # CPU-only align，因此这里不配置 GPU。
  devices: []
  # 总 worker 数直接等于 6。
  workers_per_device: 6
  cpu_threads_per_worker: 8
  start_method: spawn
  show_main_progress: true
  show_worker_logs: false

logging:
  level: INFO
  main_log_filename: preprocess.log
  worker_log_filename_template: preprocess_rank{rank}.log
